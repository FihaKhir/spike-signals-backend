<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octopus Hunter — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1016; --panel:#121a1f; --border:#1f2f33; --text:#e4e7eb;
    --muted:#6b7280; --up:#35c77e; --down:#e5484d; --gold:#d4a72c; --accent:#2ea8a8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; padding:24px 16px 60px; }
  .wrap{ max-width:700px; margin:0 auto; }
  h1{ font-family:'IBM Plex Mono',monospace; font-size:20px; margin-bottom:24px; }
  .panel{ background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
  label{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; display:block; margin-bottom:6px; }
  input, select{
    width:100%; background:#0e1119; border:1px solid var(--border); color:var(--text);
    font-family:'IBM Plex Mono',monospace; font-size:14px; padding:10px 12px; border-radius:6px; margin-bottom:14px;
  }
  button{
    background:var(--accent); border:none; color:#04120f; font-family:'IBM Plex Mono',monospace;
    font-weight:700; font-size:13px; padding:10px 16px; border-radius:6px; cursor:pointer;
  }
  button.secondary{ background:var(--panel); border:1px solid var(--border); color:var(--text); }
  .result{ margin-top:14px; font-family:'IBM Plex Mono',monospace; font-size:15px; }
  .result .code{ color:var(--gold); font-weight:700; font-size:18px; letter-spacing:0.05em; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th, td{ text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); font-family:'IBM Plex Mono',monospace; }
  th{ color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:0.05em; }
  .status{ padding:2px 7px; border-radius:4px; font-size:11px; font-weight:700; }
  .status.active{ background:rgba(53,199,126,0.15); color:var(--up); }
  .status.lifetime{ background:rgba(212,167,44,0.15); color:var(--gold); }
  .status.unused{ background:rgba(107,114,128,0.15); color:var(--muted); }
  .status.expired{ background:rgba(229,72,77,0.15); color:var(--down); }
  .error{ color:var(--down); font-size:13px; margin-top:10px; }
  #lockScreen{ max-width:340px; margin:80px auto; text-align:center; }
</style>
</head>
<body>

<div id="lockScreen">
  <h1>Admin Access</h1>
  <label>Admin password</label>
  <input type="password" id="adminSecretInput" placeholder="Enter admin password">
  <button onclick="unlockAdmin()" style="width:100%;">Unlock</button>
  <div class="error" id="lockError"></div>
</div>

<div class="wrap" id="adminPanel" style="display:none;">
  <h1>🐙 Octopus Hunter — Code Generator (Public)</h1>

  <div class="panel">
    <label>Duration</label>
    <select id="durationSelect">
      <option value="5">5 days</option>
      <option value="15">15 days</option>
      <option value="30">30 days</option>
      <option value="lifetime">Lifetime</option>
    </select>
    <label>Label (optional, e.g. who it's for)</label>
    <input type="text" id="labelInput" placeholder="e.g. Ahmed">
    <button onclick="generateCode()">Generate Code</button>
    <div class="result" id="genResult"></div>
    <div class="error" id="genError"></div>
  </div>

  <div class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <span style="font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--muted);">All codes</span>
      <button class="secondary" onclick="loadCodes()">Refresh</button>
    </div>
    <table>
      <thead>
        <tr><th>Code</th><th>Label</th><th>Duration</th><th>Status</th><th>Expires</th></tr>
      </thead>
      <tbody id="codesTableBody"></tbody>
    </table>
  </div>
</div>

<script>
const ADMIN_KEY = 'octopusHunterAdminSecret';
let adminSecret = localStorage.getItem(ADMIN_KEY);

function unlockAdmin(){
  const val = document.getElementById('adminSecretInput').value.trim();
  if(!val) return;
  adminSecret = val;
  localStorage.setItem(ADMIN_KEY, val);
  tryShowPanel();
}

async function tryShowPanel(){
  // Validate by attempting to load the codes list
  const ok = await loadCodes();
  if(ok){
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
  } else {
    document.getElementById('lockError').textContent = 'Wrong password.';
    localStorage.removeItem(ADMIN_KEY);
    adminSecret = null;
  }
}

async function generateCode(){
  const durationVal = document.getElementById('durationSelect').value;
  const duration_days = durationVal === 'lifetime' ? null : parseInt(durationVal, 10);
  const label = document.getElementById('labelInput').value.trim();

  document.getElementById('genError').textContent = '';
  document.getElementById('genResult').textContent = '';

  try{
    const res = await fetch('/api/generate-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_secret: adminSecret, duration_days, label })
    });
    const data = await res.json();
    if(!res.ok){
      document.getElementById('genError').textContent = data.error || 'Failed to generate code.';
      return;
    }
    document.getElementById('genResult').innerHTML =
      `Code: <span class="code">${data.code}</span> (${duration_days ? duration_days + ' days' : 'lifetime'})`;
    loadCodes();
  }catch(e){
    document.getElementById('genError').textContent = 'Network error.';
  }
}

async function loadCodes(){
  try{
    const res = await fetch('/api/list-codes?admin_secret=' + encodeURIComponent(adminSecret));
    if(!res.ok) return false;
    const rows = await res.json();
    const tbody = document.getElementById('codesTableBody');
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${r.code}</td>
        <td>${r.label || '—'}</td>
        <td>${r.duration_days ? r.duration_days + 'd' : 'lifetime'}</td>
        <td><span class="status ${r.status}">${r.status}</span></td>
        <td>${r.expires_at ? new Date(r.expires_at).toLocaleString() : '—'}</td>
      </tr>
    `).join('');
    return true;
  }catch(e){
    return false;
  }
}

if(adminSecret){
  tryShowPanel();
}
</script>

</body>
</html>
