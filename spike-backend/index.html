<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIHA KHIR — Spike Signal Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0e14;
    --panel: #131720;
    --border: #232a37;
    --text: #e4e7eb;
    --muted: #6b7280;
    --up: #35c77e;
    --down: #e5484d;
    --gold: #d4a72c;
    --urgent: #e5484d;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:24px 16px 60px;
  }
  body.lang-ar{ font-family:'Tajawal',sans-serif; }
  .ltr{ direction:ltr; unicode-bidi:embed; display:inline-block; }
  header{
    max-width:1100px;
    margin:0 auto 6px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  header h1{
    font-family:'IBM Plex Mono',monospace;
    font-size:24px;
    font-weight:700;
    letter-spacing:0.03em;
  }
  header .sub{
    font-size:12px;
    color:var(--gold);
    text-transform:uppercase;
    letter-spacing:0.1em;
    margin-top:2px;
  }
  .top-controls{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .pill-btn{
    background:var(--panel); border:1px solid var(--border); color:var(--muted);
    font-family:'IBM Plex Mono',monospace; font-size:12px; padding:6px 12px;
    border-radius:6px; cursor:pointer;
  }
  .clock{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--muted);
  }
  .tracked-bar{
    max-width:1100px;
    margin:18px auto 26px;
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
    padding:14px 0;
  }
  .tracked-bar .label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin-bottom:9px;
  }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:5px;
    padding:4px 8px;
  }
  .grid{
    max-width:1100px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:14px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px;
    cursor:pointer;
    transition:border-color .15s ease, transform .1s ease, background .2s ease;
    position:relative;
  }
  .card:hover{ border-color:#3a4356; transform:translateY(-1px); }
  .card.closed{ opacity:0.55; }
  .card.urgent{
    border-color:var(--urgent);
    background:rgba(229,72,77,0.08);
  }
  .card .symbol{
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    font-weight:600;
    margin-bottom:2px;
  }
  .card .dir{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-weight:600;
    margin-bottom:6px;
  }
  .dir.up{color:var(--up);}
  .dir.down{color:var(--down);}
  .closed-badge{
    display:inline-block;
    font-size:10px;
    font-weight:700;
    letter-spacing:0.05em;
    padding:2px 6px;
    border-radius:4px;
    margin-bottom:8px;
  }
  .closed-badge.tp{ background:rgba(53,199,126,0.15); color:var(--up); }
  .closed-badge.sl{ background:rgba(229,72,77,0.15); color:var(--down); }
  .confirm-badge{
    display:inline-flex;
    align-items:center;
    gap:4px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:600;
    padding:3px 7px;
    border-radius:5px;
    margin-bottom:8px;
  }
  .confirm-badge.tier-3{ background:rgba(212,167,44,0.15); color:var(--gold); }
  .confirm-badge.tier-2{ background:rgba(94,140,214,0.15); color:#5e8cd6; }
  .confirm-badge.tier-1{ background:rgba(107,114,128,0.15); color:var(--muted); }
  .gauge-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    margin:6px 0 10px;
    position:relative;
  }
  .gauge-num{
    font-family:'IBM Plex Mono',monospace;
    font-size:22px;
    font-weight:700;
    position:absolute;
    text-align:center;
  }
  .gauge-label{
    font-size:9px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  .card .tf{
    font-size:10px;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
  }
  .card .countdown{
    font-size:10px;
    font-family:'IBM Plex Mono',monospace;
    text-align:right;
    color:var(--muted);
  }
  .card.urgent .countdown{ color:var(--urgent); font-weight:700; }
  .card .foot-row{
    display:flex; justify-content:space-between; align-items:center;
  }
  .empty{
    max-width:1100px;
    margin:50px auto;
    text-align:center;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    line-height:1.7;
  }
  .overlay{
    position:fixed; inset:0;
    background:rgba(4,6,10,0.7);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
  }
  .overlay.show{ display:flex; }
  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    max-width:420px;
    width:100%;
    max-height:90vh;
    overflow-y:auto;
    padding:26px;
  }
  .panel-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:18px;
  }
  .panel-head .symbol{
    font-family:'IBM Plex Mono',monospace;
    font-size:20px;
    font-weight:700;
  }
  .panel-head .dir{
    display:inline-block;
    margin-top:6px;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-weight:700;
    padding:3px 8px;
    border-radius:5px;
  }
  .dir.up{ background:rgba(53,199,126,0.12); }
  .dir.down{ background:rgba(229,72,77,0.12); }
  .close-btn{
    background:none; border:none; color:var(--muted);
    font-size:20px; cursor:pointer; line-height:1;
  }
  .confidence-big{ text-align:center; margin:8px 0 14px; }
  .confidence-big .num{
    font-family:'IBM Plex Mono',monospace;
    font-size:44px; font-weight:700; color:var(--gold);
  }
  .confidence-big .lbl{
    font-size:11px; color:var(--muted);
    text-transform:uppercase; letter-spacing:0.08em; margin-top:2px;
  }
  .countdown-big{
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--muted);
    margin-bottom:18px;
    padding:8px;
    border-radius:8px;
    border:1px solid var(--border);
  }
  .countdown-big.urgent{ color:var(--urgent); border-color:var(--urgent); background:rgba(229,72,77,0.08); font-weight:700; }
  .levels{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-bottom:18px;
  }
  .level-box{
    background:#0e1119;
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 8px;
    text-align:center;
  }
  .level-box .l-label{
    font-size:9px; color:var(--muted);
    text-transform:uppercase; letter-spacing:0.05em; margin-bottom:5px;
  }
  .level-box .l-value{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px; font-weight:600;
  }
  .level-box.entry .l-value{ color:var(--text); }
  .level-box.sl .l-value{ color:var(--down); }
  .level-box.tp .l-value{ color:var(--up); }
  .meta-row{
    display:flex; justify-content:space-between;
    font-size:11px; color:var(--muted);
    margin-bottom:10px;
    font-family:'IBM Plex Mono',monospace;
  }
  .components{ margin:16px 0 18px; }
  .comp-row{ margin-bottom:12px; }
  .comp-row .top{
    display:flex; justify-content:space-between;
    font-size:12px; margin-bottom:5px;
  }
  .comp-row .top .name{ color:var(--muted); }
  .comp-row .top .val{ font-family:'IBM Plex Mono',monospace; }
  .bar-track{ height:5px; background:#1c2230; border-radius:3px; overflow:hidden; }
  .bar-fill{ height:100%; background:var(--gold); border-radius:3px; }
  .disclaimer{ font-size:11px; line-height:1.6; color:var(--muted); }

  body.lang-ar .dir, body.lang-ar .closed-badge, body.lang-ar .confirm-badge,
  body.lang-ar .gauge-label, body.lang-ar .tf, body.lang-ar .countdown,
  body.lang-ar .l-label, body.lang-ar .lbl, body.lang-ar .meta-row,
  body.lang-ar .comp-row .name, body.lang-ar .disclaimer, body.lang-ar .empty,
  body.lang-ar .label { font-family:'Tajawal',sans-serif; }

  @media (max-width:480px){
    body{ padding:16px 12px 50px; }
    header h1{ font-size:20px; }
    .grid{ grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
    .card{ padding:12px; }
    .levels{ grid-template-columns:1fr; }
  }
</style>
</head>
<body id="bodyRoot">

<header>
  <div>
    <h1>FIHA KHIR</h1>
    <div class="sub" id="subtitleText">Spike Signal Hub</div>
  </div>
  <div class="top-controls">
    <button id="langBtn" class="pill-btn" onclick="toggleLang()">🌐 العربية</button>
    <button id="soundToggle" class="pill-btn" onclick="toggleSound()">🔕 Enable Sound</button>
    <div class="clock" id="clock">—</div>
  </div>
</header>

<div class="tracked-bar">
  <div class="label" id="trackedLabel">Tracked symbols</div>
  <div class="chips" id="chips"></div>
</div>

<div id="grid" class="grid"></div>
<div id="empty" class="empty" style="display:none;"></div>

<div class="overlay" id="overlay">
  <div class="panel" id="panel"></div>
</div>

<script>
const API_URL = '/api/latest';
const POLL_MS = 4000;
const CLOSED_VISIBLE_MS = 60 * 1000;      // keep a TP/SL-hit card visible for 1 minute after it closes

const TRACKED_SYMBOLS = [
  'GainX 400','GainX 600','GainX 800','GainX 999','GainX 1200','GainX 1800',
  'PainX 400','PainX 600','PainX 800','PainX 999','PainX 1200','PainX 1800',
  'BreakX 600','BreakX 1200','BreakX 1800',
  'SwitchX 600','SwitchX 1200','SwitchX 1800',
  'TrendX 600','TrendX 1200','TrendX 1800'
];

// --- i18n ------------------------------------------------------------
const I18N = {
  en: {
    subtitle: 'Spike Signal Hub',
    tracked: 'Tracked symbols',
    confidence: 'composite confidence',
    entry: 'Entry', stopLoss: 'Stop Loss', takeProfit: 'Take Profit',
    timeframe: 'Timeframe', family: 'family', ticks: 'ticks',
    compression: 'Compression', velocity: 'Velocity', familySignal: 'Family signal',
    up: 'up', down: 'down', tpHit: 'TP HIT', slHit: 'SL HIT', confirmed: 'confirmed',
    emptyLine1: 'No active signals right now.',
    emptyLine2: 'The robot is watching — a box appears here the moment one fires.',
    soundOn: '🔔 Sound On', soundOff: '🔕 Enable Sound',
    langBtn: '🌐 العربية',
    disclaimer: 'Entry, SL and TP are calculated from the live price and recent ATR at signal time — a statistical estimate, not a guaranteed outcome. Synthetic index spikes have a random component; use this alongside your own risk management.',
    leftToEnter: 'left to enter', closingSoon: 'Closing soon', expired: 'Expired'
  },
  ar: {
    subtitle: 'مركز إشارات القفزات',
    tracked: 'الرموز المتابَعة',
    confidence: 'مستوى الثقة المركب',
    entry: 'الدخول', stopLoss: 'وقف الخسارة', takeProfit: 'جني الأرباح',
    timeframe: 'الإطار الزمني', family: 'العائلة', ticks: 'تكة',
    compression: 'الانضغاط', velocity: 'السرعة', familySignal: 'إشارة العائلة',
    up: 'صعود', down: 'هبوط', tpHit: 'تحقق الهدف', slHit: 'تفعيل الوقف', confirmed: 'مؤكد',
    emptyLine1: 'لا توجد إشارات نشطة حالياً.',
    emptyLine2: 'الروبوت يراقب — سيظهر مربع هنا فور صدور إشارة.',
    soundOn: '🔔 الصوت مفعّل', soundOff: '🔕 تفعيل الصوت',
    langBtn: '🌐 English',
    disclaimer: 'يتم حساب الدخول ووقف الخسارة وجني الأرباح بناءً على السعر الحي ومتوسط المدى الحقيقي الأخير (ATR) — وهو تقدير إحصائي وليس نتيجة مضمونة. تحتوي قفزات المؤشرات الاصطناعية على عنصر عشوائي؛ استخدم هذا جنباً إلى جنب مع إدارة المخاطر الخاصة بك.',
    leftToEnter: 'متبقٍ للدخول', closingSoon: 'قريب من الإغلاق', expired: 'منتهية'
  }
};

let currentLang = 'en';
function t(key){ return I18N[currentLang][key]; }

function toggleLang(){
  currentLang = (currentLang === 'en') ? 'ar' : 'en';
  const body = document.getElementById('bodyRoot');
  const html = document.getElementById('htmlRoot');
  body.classList.toggle('lang-ar', currentLang === 'ar');
  html.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
  html.lang = currentLang;
  applyStaticText();
  renderGrid(lastData || []); // re-render with the new language
}

function applyStaticText(){
  document.getElementById('subtitleText').textContent = t('subtitle');
  document.getElementById('trackedLabel').textContent = t('tracked');
  document.getElementById('langBtn').textContent = t('langBtn');
  document.getElementById('soundToggle').textContent = soundEnabled ? t('soundOn') : t('soundOff');
  const empty = document.getElementById('empty');
  empty.innerHTML = `${t('emptyLine1')}<br>${t('emptyLine2')}`;
}

document.getElementById('chips').innerHTML =
  TRACKED_SYMBOLS.map(s => `<span class="chip ltr">${s}</span>`).join('');

// --- Sound notifications ----------------------------------------------
let soundEnabled = false;
let audioCtx = null;
let seenKeys = new Set();
let firstPoll = true;

function toggleSound(){
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundToggle');
  if(soundEnabled){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    btn.textContent = t('soundOn');
    btn.style.color = 'var(--gold)';
    btn.style.borderColor = 'var(--gold)';
    playDing();
  } else {
    btn.textContent = t('soundOff');
    btn.style.color = 'var(--muted)';
    btn.style.borderColor = 'var(--border)';
  }
}

function playDing(){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.35);
}

function checkForNewSignals(data){
  const activeNow = (data || []).filter(s => (s.status || 'active') === 'active');
  const currentKeys = new Set(activeNow.map(s => s.symbol + ':' + s.sent_at));
  if(!firstPoll && soundEnabled){
    for(const s of activeNow){
      const key = s.symbol + ':' + s.sent_at;
      if(!seenKeys.has(key)) { playDing(); break; }
    }
  }
  firstPoll = false;
  seenKeys = currentKeys;
}

// --- Client-anchored timing (immune to broker clock drift) ------------
// The broker's server clock can run ahead of real time, so instead of
// trusting the signal's own timestamp for "how long ago"/"time left", we
// stamp the moment OUR browser first sees each signal and count from there.
let firstSeenAt = {}; // key -> ms (Date.now()) when we first saw this exact signal

function anchorKey(s){ return s.symbol + ':' + s.sent_at; }

function ensureAnchors(data){
  const liveKeys = new Set();
  for(const s of (data || [])){
    const key = anchorKey(s);
    liveKeys.add(key);
    if(!(key in firstSeenAt)) firstSeenAt[key] = Date.now();
  }
  // prune old anchors no longer present, so this doesn't grow forever
  for(const key of Object.keys(firstSeenAt)){
    if(!liveKeys.has(key)) delete firstSeenAt[key];
  }
}

function elapsedSecondsSince(s){
  return Math.floor((Date.now() - firstSeenAt[anchorKey(s)]) / 1000);
}

function formatAgo(sec){
  if(sec < 60) return sec + 's ago';
  if(sec < 3600) return Math.floor(sec/60) + 'm ago';
  return Math.floor(sec/3600) + 'h ago';
}

// --- Rendering ----------------------------------------------------------
function gaugeSVG(confidence, color){
  const r = 30, c = 2*Math.PI*r;
  const offset = c - (confidence/100)*c;
  return `
    <svg width="76" height="76" viewBox="0 0 76 76">
      <circle cx="38" cy="38" r="${r}" stroke="#1c2230" stroke-width="6" fill="none"/>
      <circle cx="38" cy="38" r="${r}" stroke="${color}" stroke-width="6" fill="none"
        stroke-dasharray="${c}" stroke-dashoffset="${offset}"
        stroke-linecap="round" transform="rotate(-90 38 38)"/>
    </svg>`;
}

function confirmBadge(confirmations){
  if(confirmations === undefined || confirmations === null) return '';
  const tier = confirmations >= 3 ? 'tier-3' : confirmations >= 2 ? 'tier-2' : 'tier-1';
  return `<span class="confirm-badge ${tier}">${confirmations}/3 ${t('confirmed')}</span>`;
}

function isVisible(s){
  const status = s.status || 'active';
  if(status === 'active') return true; // no more time-based expiry — only a real TP/SL hit removes a card now
  if(!s.hit_time) return false;
  const ageMs = Date.now() - (s.hit_time * 1000);
  return ageMs < CLOSED_VISIBLE_MS;
}

let lastData = [];

function renderGrid(data){
  lastData = data;
  ensureAnchors(data);

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const visible = (data || []).filter(isVisible);

  if(visible.length === 0){
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const sorted = [...visible].sort((a,b) => {
    const aActive = (a.status || 'active') === 'active';
    const bActive = (b.status || 'active') === 'active';
    if(aActive !== bActive) return aActive ? -1 : 1;
    return b.confidence - a.confidence;
  });

  grid.innerHTML = sorted.map((s, i) => {
    const status = s.status || 'active';
    const isClosed = status !== 'active';
    const colorHex = s.direction === 'up' ? '#35c77e' : '#e5484d';

    return `
    <div class="card ${isClosed ? 'closed' : ''}" onclick="openDetail(${i})">
      <div class="symbol ltr">${s.symbol}</div>
      <div class="dir ${s.direction}">${s.direction === 'up' ? '▲ ' + t('up') : '▼ ' + t('down')}</div>
      ${isClosed ? `<div class="closed-badge ${status === 'tp_hit' ? 'tp' : 'sl'}">${status === 'tp_hit' ? t('tpHit') : t('slHit')}</div>` : confirmBadge(s.confirmations)}
      <div class="gauge-wrap">
        ${gaugeSVG(s.confidence, isClosed ? '#3a4356' : colorHex)}
        <div class="gauge-num">${Math.round(s.confidence)}</div>
      </div>
      <div class="gauge-label" style="text-align:center; margin-bottom:8px;">${t('confidence')}</div>
      <div class="foot-row">
        <span class="tf ltr">${s.timeframe || ''}${s.family ? ' · ' + s.family : ''}</span>
        <span class="countdown ltr">${formatAgo(elapsedSecondsSince(s))}</span>
      </div>
    </div>`;
  }).join('');

  window.__signals = sorted;
}

function fmtPrice(v){
  if(v === null || v === undefined) return '—';
  return Number(v).toFixed(v >= 100 ? 2 : 5);
}

function openDetail(i){
  const s = window.__signals[i];
  const panel = document.getElementById('panel');
  const isUp = s.direction === 'up';
  const status = s.status || 'active';
  const isClosed = status !== 'active';

  const countdownHtml = `<div class="countdown-big ltr">${formatAgo(elapsedSecondsSince(s))}</div>`;

  panel.innerHTML = `
    <div class="panel-head">
      <div>
        <div class="symbol ltr">${s.symbol}</div>
        <div class="dir ${s.direction}" style="color:${isUp ? 'var(--up)' : 'var(--down)'}">
          ${isUp ? '▲ ' + t('up') : '▼ ' + t('down')}
        </div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>

    <div class="confidence-big">
      <div class="num">${s.confidence.toFixed(1)}%</div>
      <div class="lbl">${t('confidence')} ${isClosed ? '· ' + (status === 'tp_hit' ? t('tpHit') : t('slHit')) : ''}</div>
      <div style="margin-top:10px;">${confirmBadge(s.confirmations)}</div>
    </div>

    ${countdownHtml}

    <div class="levels">
      <div class="level-box entry">
        <div class="l-label">${t('entry')}</div>
        <div class="l-value ltr">${fmtPrice(s.entry_price)}</div>
      </div>
      <div class="level-box sl">
        <div class="l-label">${t('stopLoss')}</div>
        <div class="l-value ltr">${fmtPrice(s.sl_price)}</div>
      </div>
      <div class="level-box tp">
        <div class="l-label">${t('takeProfit')}</div>
        <div class="l-value ltr">${fmtPrice(s.tp_price)}</div>
      </div>
    </div>

    <div class="meta-row">
      <span class="ltr">${s.family || ''} ${t('family')}${s.ticks_since_jump !== undefined && s.expected_gap_ticks ? ' · ' + s.ticks_since_jump + '/' + s.expected_gap_ticks + ' ' + t('ticks') : ''}</span>
      <span class="ltr">${t('timeframe')}: ${s.timeframe || '—'}</span>
    </div>

    <div class="components">
      ${compRow(t('compression'), s.compression)}
      ${compRow(t('velocity'), s.velocity)}
      ${compRow(t('familySignal') + ' (' + (s.family || '—') + ')', s.family_score ?? s.time_since_spike)}
    </div>

    <div class="disclaimer">${t('disclaimer')}</div>
  `;
  document.getElementById('overlay').classList.add('show');
}

function compRow(name, val){
  return `
    <div class="comp-row">
      <div class="top"><span class="name">${name}</span><span class="val ltr">${val?.toFixed(1) ?? '—'}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${val ?? 0}%"></div></div>
    </div>`;
}

function closeDetail(){
  document.getElementById('overlay').classList.remove('show');
}

async function poll(){
  try{
    const res = await fetch(API_URL);
    const data = await res.json();
    checkForNewSignals(data);
    renderGrid(data);
  }catch(e){
    console.error('Failed to fetch signals', e);
  }
}

function updateClock(){
  document.getElementById('clock').textContent = new Date().toUTCString().slice(17,25) + ' UTC';
}

applyStaticText();
poll();
setInterval(poll, POLL_MS);
setInterval(() => renderGrid(lastData), 1000); // keep the countdown ticking every second between polls
updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
